<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; padding: 0; background: #000; color: #00d2ff; font-family: 'Arial', sans-serif; overflow: hidden; user-select: none; }
        #espacio { width: 100vw; height: 100vh; background: #050505; position: relative; }

        /* PLANETAS */
        .planeta {
            position: absolute; width: 80px; height: 80px; border-radius: 50%; cursor: pointer;
            transition: all 0.3s ease; border: 3px solid rgba(255,255,255,0.1);
            display: flex; align-items: center; justify-content: center;
        }

        .etiqueta { position: absolute; bottom: -25px; font-size: 11px; font-weight: bold; color: white; text-shadow: 2px 2px 2px black; }

        /* ICONO DE BANDERA (🚩) */
        .icono-bandera {
            display: none; position: absolute; top: -35px; font-size: 30px; z-index: 10;
        }

        /* ANIMACIÓN DE SELECCIÓN */
        @keyframes pulso {
            0% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.2); filter: brightness(2); }
            100% { transform: scale(1); filter: brightness(1); }
        }
        .animar { animation: pulso 0.4s ease-out; }

        /* ESTADOS COLORES */
        .rojo { box-shadow: 0 0 50px #ff0000; border-color: #ff0000 !important; }
        .verde { box-shadow: 0 0 50px #00ff00; border-color: #00ff00 !important; }

        /* MENÚ TÁCTICO */
        #menu-tactico {
            display: none; position: absolute; background: #001529; border: 2px solid #00d2ff;
            padding: 10px; width: 200px; border-radius: 10px; z-index: 9999; box-shadow: 0 0 20px black;
        }
        .btn { display: block; width: 100%; padding: 10px; margin: 5px 0; cursor: pointer; font-weight: bold; text-transform: uppercase; border: 1px solid #00d2ff; background: transparent; color: #00d2ff; }
        .btn:hover { background: #00d2ff; color: black; }
        .btn-atacar:hover { background: red; border-color: red; color: white; }
        .btn-defender:hover { background: green; border-color: green; color: white; }
    </style>
</head>
<body>

<div id="espacio" onclick="cerrarMenu()">
    
    <div id="p1" class="planeta" style="top: 20%; left: 30%; background: radial-gradient(circle, #555, #222);" onclick="abrirMenu(event, 'Coruscant', 'p1')">
        <span class="icono-bandera">🚩</span>
        <div class="etiqueta">CORUSCANT</div>
    </div>

    <div id="p2" class="planeta" style="top: 50%; left: 60%; background: radial-gradient(circle, #f0ad4e, #8a6d3b);" onclick="abrirMenu(event, 'Tatooine', 'p2')">
        <span class="icono-bandera">🚩</span>
        <div class="etiqueta">TATOOINE</div>
    </div>

    <div id="p3" class="planeta" style="top: 70%; left: 20%; background: radial-gradient(circle, #5cb85c, #2d5a2d);" onclick="abrirMenu(event, 'Endor', 'p3')">
        <span class="icono-bandera">🚩</span>
        <div class="etiqueta">ENDOR</div>
    </div>

    <div id="menu-tactico" onclick="event.stopPropagation()">
        <h3 id="txt-nombre" style="text-align:center; color:white; margin:5px;">PLANETA</h3>
        <button class="btn" onclick="ejecutar('CONQUISTA')">🚩 MARCAR CONQUISTA</button>
        <button class="btn btn-atacar" onclick="ejecutar('ATAQUE')">⚔️ INICIAR ATAQUE</button>
        <button class="btn btn-defender" onclick="ejecutar('DEFENSA')">🛡️ REFORZAR SECTOR</button>
    </div>
</div>

<script>
    var menu = document.getElementById('menu-tactico');
    var titulo = document.getElementById('txt-nombre');
    var idActual = "";

    function abrirMenu(e, nombre, id) {
        e.stopPropagation();
        idActual = id;
        titulo.innerText = nombre.toUpperCase();
        menu.style.display = 'block';
        menu.style.left = e.clientX + "px";
        menu.style.top = e.clientY + "px";
    }

    function ejecutar(tipo) {
        var p = document.getElementById(idActual);
        var bandera = p.querySelector('.icono-bandera');

        // Limpiar todo
        p.classList.remove('rojo', 'verde', 'animar');
        bandera.style.display = "none";

        // Animación de impacto
        setTimeout(function(){ p.classList.add('animar'); }, 1);

        // Aplicar estado
        if(tipo === 'CONQUISTA') {
            bandera.style.display = "block";
        } else if(tipo === 'ATAQUE') {
            p.classList.add('rojo');
        } else if(tipo === 'DEFENSA') {
            p.classList.add('verde');
        }

        cerrarMenu();
    }

    function cerrarMenu() { menu.style.display = 'none'; }
</script>

</body>
</html>
