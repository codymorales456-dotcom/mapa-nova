<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; padding: 0; background: #000; color: #00d2ff; font-family: 'Segoe UI', sans-serif; overflow: hidden; user-select: none; }
        #espacio { width: 100vw; height: 100vh; background: radial-gradient(circle at center, #1B2735 0%, #000 100%); position: relative; }

        /* ESTILO BASE PLANETAS */
        .planeta {
            position: absolute; width: 65px; height: 65px; border-radius: 50%; cursor: pointer;
            transition: all 0.3s ease; display: flex; align-items: center; justify-content: center;
            border: 2px solid rgba(255,255,255,0.2);
        }
        .planeta:hover { transform: scale(1.2); z-index: 10; filter: brightness(1.3); }

        /* COLORES DE FACCIÓN */
        .republica { border-color: #00a2ff; box-shadow: 0 0 15px rgba(0, 162, 255, 0.5); }
        .cis { border-color: #ff3333; box-shadow: 0 0 15px rgba(255, 51, 51, 0.5); }

        .etiqueta { position: absolute; bottom: -22px; font-size: 10px; font-weight: bold; color: white; text-shadow: 1px 1px 3px black; text-transform: uppercase; white-space: nowrap; }
        .icono-bandera { display: none; position: absolute; top: -35px; font-size: 25px; z-index: 10; }

        /* ESTADOS TÁCTICOS (SINCRONIZADOS) */
        .ataque { box-shadow: 0 0 40px #ff0000 !important; border-color: #ff0000 !important; background: rgba(255,0,0,0.4) !important; }
        .defensa { box-shadow: 0 0 40px #00ff00 !important; border-color: #00ff00 !important; background: rgba(0,255,0,0.4) !important; }
        .animar { animation: pulso 0.4s ease-out; }
        @keyframes pulso { 0% { transform: scale(1); } 50% { transform: scale(1.3); } 100% { transform: scale(1); } }

        /* MENÚ */
        #menu-tactico {
            display: none; position: absolute; background: rgba(0, 20, 40, 0.95); border: 2px solid #00d2ff;
            padding: 10px; width: 180px; border-radius: 8px; z-index: 9999; box-shadow: 0 0 20px black;
        }
        .btn { display: block; width: 100%; padding: 8px; margin: 4px 0; cursor: pointer; font-size: 10px; font-weight: bold; text-transform: uppercase; border: 1px solid #00d2ff; background: transparent; color: #00d2ff; transition: 0.2s; }
        .btn:hover { background: #00d2ff; color: black; }
        .btn-atacar:hover { background: #ff3333; border-color: #ff3333; color: white; }
        .btn-defender:hover { background: #33ff33; border-color: #33ff33; color: black; }
    </style>
</head>
