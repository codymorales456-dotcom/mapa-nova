<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>TERMINAL ESTRATÉGICA HOLOGRÁFICA - NOVA NETWORKS</title>
    <style>
        body { margin: 0; padding: 0; background: #000; color: #fff; font-family: 'Segoe UI', 'Arial', sans-serif; overflow: hidden; user-select: none; }
        
        /* 1. CONTENEDOR PRINCIPAL CON TU FONDO.PNG */
        #espacio {
            width: 100vw; height: 100vh;
            background-image: url('fondo.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
            z-index: 1;
            /* Tinte base azul holograma */
            background-color: #001a33; 
            background-blend-mode: overlay;
        }

        /* 2. EFECTO DE RESPLANDOR DIFUSO Y PARPADEO (OVERLAY) */
        #holograma-capa {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, rgba(0, 210, 255, 0.15) 0%, rgba(0, 0, 0, 0.6) 100%);
            z-index: 10; /* Por encima de los planetas */
            pointer-events: none; /* No interfiere con los clics */
            mix-blend-mode: screen;
            animation: parpadeo-holograma 4s infinite;
        }

        /* 3. LÍNEAS DE ESCANEO (SCANLINES) HORIZONTALES */
        #scanlines {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(
                to bottom,
                rgba(255, 255, 255, 0) 0%,
                rgba(0, 210, 255, 0.03) 50%,
                rgba(255, 255, 255, 0) 100%
            );
            background-size: 100% 4px; /* Grosor de las líneas */
            z-index: 11; /* Por encima del resplandor */
            pointer-events: none;
            opacity: 0.7;
        }

        /* ANIMACIÓN DE PARPADEO ALEATORIO */
        @keyframes parpadeo-holograma {
            0% { opacity: 0.95; }
            5% { opacity: 0.85; }
            10% { opacity: 0.98; }
            15% { opacity: 0.9; }
            20% { opacity: 1; }
            60% { opacity: 0.97; }
            80% { opacity: 0.92; }
            100% { opacity: 0.95; }
        }

        /* LIENZO PARA LAS RUTAS */
        #rutas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; }

        /* ESTILO PLANETAS */
        .planeta {
            position: absolute; width: 60px; height: 60px; border-radius: 50%; cursor: pointer;
            transition: all 0.3s ease; display: flex; align-items: center; justify-content: center;
            border: 2px solid rgba(0, 210, 255, 0.4); z-index: 5;
            background-size: cover; background-position: center; background-repeat: no-repeat;
            /* Efecto de tinte holográfico en la foto */
            filter: cyan(1) brightness(0.9) contrast(1.1);
        }
        
        .planeta:hover { transform: scale(1.2) translateY(-5px); filter: brightness(1.3) cyan(0); z-index: 15; border-color: rgba(0, 210, 255, 1); box-shadow: 0 0 25px rgba(0, 210, 255, 0.8); }

        /* BORDES DE FACCIÓN (Estilo Neón tenue) */
        .republica { border-color: #00a2ff; box-shadow: 0 0 10px rgba(0, 162, 255, 0.4); }
        .cis { border-color: #ff3333; box-shadow: 0 0 10px rgba(255, 51, 51, 0.4); }

        .etiqueta { position: absolute; bottom: -20px; font-size: 9px; font-weight: bold; color: rgba(0, 210, 255, 0.9); text-shadow: 0 0 5px rgba(0, 210, 255, 0.5); text-transform: uppercase; white-space: nowrap; z-index: 6;}
        .icono-bandera { display: none; position: absolute; top: -35px; font-size: 25px; z-index: 20; filter: drop-shadow(0 0 5px red); }

        /* ESTADOS TÁCTICOS */
        .ataque { box-shadow: 0 0 35px #ff0000 !important; border-color: #ff0000 !important; }
        .defensa { box-shadow: 0 0 35px #00ff00 !important; border-color: #00ff00 !important; }
        
        /* MENÚ */
        #menu-tactico {
            display: none; position: absolute; background: rgba(0, 15, 35, 0.92); border: 2px solid #00d2ff;
            padding: 10px; width: 175px; border-radius: 5px; z-index: 9999; box-shadow: 0 0 30px rgba(0, 210, 255, 0.4);
            backdrop-filter: blur(8px);
        }
        #menu-tactico h3 { text-align:center; margin:5px 0 10px 0; font-size:12px; color: #00d2ff; text-shadow: 0 0 5px #00d2ff; border-bottom: 1px solid rgba(0, 210, 255, 0.3); padding-bottom: 5px;}
        .btn { display: block; width: 100%; padding: 8px; margin: 4px 0; cursor: pointer; font-size: 10px; font-weight: bold; border: 1px solid #00d2ff; background: transparent; color: #00d2ff; text-transform: uppercase; transition: 0.2s;}
        .btn:hover { background: rgba(0, 210, 255, 0.2); box-shadow: 0 0 10px rgba(0, 210, 255, 0.5); }
        .btn-atacar:hover { background: rgba(255, 51, 51, 0.2); border-color: #ff3333; color: #ff3333; }
        .btn-defender:hover { background: rgba(51, 255, 51, 0.2); border-color: #33ff33; color: #33ff33; }
    </style>
</head>
<body onclick="cerrarMenu()">

<div id="espacio">
    <div id="holograma-capa"></div>
    <div id="scanlines"></div>
    
    <canvas id="rutas"></canvas>
    
    <div id="p1" class="planeta republica" style="top: 45%; left: 48%; background-image: url('coruscant.png');" onclick="abrirMenu(event, 'Coruscant', 'p1')">
        <span class="icono-bandera">🚩</span><div class="etiqueta">Coruscant</div>
    </div>
    <div id="p2" class="planeta republica" style="top: 75%; left: 75%; background-image: url('kamino.png');" onclick="abrirMenu(event, 'Kamino', 'p2')">
        <span class="icono-bandera">🚩</span><div class="etiqueta">Kamino</div>
    </div>
    <div id="p3" class="planeta republica" style="top: 65%; left: 55%; background-image: url('naboo.png');" onclick="abrirMenu(event, 'Naboo', 'p3')">
        <span class="icono-bandera">🚩</span><div class="etiqueta">Naboo</div>
    </div>
    <div id="p4" class="planeta republica" style="top: 25%; left: 35%; background-image: url('anaxes.png');" onclick="abrirMenu(event, 'Anaxes', 'p4')">
        <span class="icono-bandera">🚩</span><div class="etiqueta">Anaxes</div>
    </div>
    <div id="p5" class="planeta republica" style="top: 55%; left: 25%; background-image: url('christophsis.png');" onclick="abrirMenu(event, 'Christophsis', 'p5')">
        <span class="icono-bandera">🚩</span><div class="etiqueta">Christophsis</div>
    </div>

    <div id="p6" class="planeta cis" style="top: 75%; left: 40%; background-image: url('geonosis.png');" onclick="abrirMenu(event, 'Geonosis', 'p6')">
        <span class="icono-bandera">🚩</span><div class="etiqueta">Geonosis</div>
    </div>
    <div id="p7" class="planeta cis" style="top: 85%; left: 25%; background-image: url('utapau.png');" onclick="abrirMenu(event, 'Utapau', 'p7')">
        <span class="icono-bandera">🚩</span><div class="etiqueta">Utapau</div>
    </div>
    <div id="p8" class="planeta cis" style="top: 15%; left: 65%; background-image: url('mygeeto.png');" onclick="abrirMenu(event, 'Mygeeto', 'p8')">
        <span class="icono-bandera">🚩</span><div class="etiqueta">Mygeeto</div>
    </div>
    <div id="p9" class="planeta cis" style="top: 40%; left: 80%; background-image: url('felucia.png');" onclick="abrirMenu(event, 'Felucia', 'p9')">
        <span class="icono-bandera">🚩</span><div class="etiqueta">Felucia</div>
    </div>
    <div id="p10" class="planeta cis" style="top: 88%; left: 10%; background-image: url('mustafar.png');" onclick="abrirMenu(event, 'Mustafar', 'p10')">
        <span class="icono-bandera">🚩</span><div class="etiqueta">Mustafar</div>
    </div>

    <div id="menu-tactico" onclick="event.stopPropagation()">
        <h3 id="txt-nombre">TRANSMISIÓN ENTRANTE</h3>
        <button class="btn" onclick="ejecutar('C')">🚩 ESTABLECER OCUPACIÓN</button>
        <button class="btn btn-atacar" onclick="ejecutar('A')">⚔️ ORDENAR ASALTO</button>
        <button class="btn btn-defender" onclick="ejecutar('D')">🛡️ ENVIAR REFUERZOS</button>
        <button class="btn" onclick="ejecutar('N')" style="font-size:8px; opacity:0.4; border-color: rgba(255,255,255,0.2); color: #fff;">[ CORTAR TRANSMISIÓN ]</button>
    </div>
</div>

<script>
    var menu = document.getElementById('menu-tactico');
    var titulo = document.getElementById('txt-nombre');
    var idActual = "";

    function abrirMenu(e, nombre, id) {
        e.stopPropagation();
        idActual = id;
        titulo.innerText = "SECTOR: " + nombre.toUpperCase();
        menu.style.display = 'block';
        
        // Posicionamiento inteligente
        let x = e.clientX + 15;
        let y = e.clientY + 15;
        if(x + 190 > window.innerWidth) x = e.clientX - 195;
        if(y + 170 > window.innerHeight) y = window.innerHeight - 175;
        
        menu.style.left = x + "px";
        menu.style.top = y + "px";
    }

    function ejecutar(tipo) {
        if(window.gmod) gmod.enviarOrden(idActual, tipo);
        cerrarMenu();
    }

    function actualizarDesdeGmod(id, tipo) {
        var p = document.getElementById(id);
        if(!p) return;
        var b = p.querySelector('.icono-bandera');
        p.classList.remove('ataque', 'defensa');
        if(b) b.style.display = "none";
        if(tipo === 'C' && b) b.style.display = "block";
        else if(tipo === 'A') p.classList.add('ataque');
        else if(tipo === 'D') p.classList.add('defensa');
    }

    function cerrarMenu() { menu.style.display = 'none'; }

    // --- DIBUJAR RUTAS ---
    function dibujarRutas() {
        const canvas = document.getElementById('rutas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        // Cyan brillante pero sutil
        ctx.strokeStyle = "rgba(0, 210, 255, 0.3)";
        ctx.lineWidth = 1;
        ctx.setLineDash([6, 10]); 
        const conexiones = [
            ['p1','p4'], ['p1','p3'], ['p1','p5'], ['p1','p6'], ['p1','p8'],
            ['p3','p2'], ['p2','p9'], ['p6','p7'], ['p7','p10'], ['p5','p4']
        ];
        conexiones.forEach(par => {
            const el1 = document.getElementById(par[0]); el2 = document.getElementById(par[1]);
            if(el1 && el2) {
                const r1 = el1.getBoundingClientRect(); const r2 = el2.getBoundingClientRect();
                ctx.beginPath();
                ctx.moveTo(r1.left + r1.width/2, r1.top + r1.height/2);
                ctx.lineTo(r2.left + r2.width/2, r2.top + r2.height/2);
                ctx.stroke();
            }
        });
    }
    window.onload = dibujarRutas;
    window.onresize = dibujarRutas;
</script>

</body>
</html>
