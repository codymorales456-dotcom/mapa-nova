<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; background: #000; color: #00d2ff; font-family: sans-serif; overflow: hidden; }
        .planeta {
            position: absolute; width: 80px; height: 80px; border-radius: 50%;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            border: 2px solid #00d2ff; transition: 0.3s;
        }
        .etiqueta { position: absolute; bottom: -20px; font-size: 12px; color: white; }
        .bandera { display: none; position: absolute; top: -40px; font-size: 30px; }
        
        /* ESTADOS */
        .ataque { box-shadow: 0 0 30px red; border-color: red !important; background: rgba(255,0,0,0.3) !important; }
        .defensa { box-shadow: 0 0 30px green; border-color: green !important; background: rgba(0,255,0,0.3) !important; }
        .animar { transform: scale(1.2); }

        #menu {
            display: none; position: absolute; background: #001; border: 1px solid #00d2ff;
            padding: 10px; z-index: 100;
        }
        button { display: block; width: 100%; margin: 5px 0; cursor: pointer; padding: 5px; }
    </style>
</head>
<body onclick="cerrarMenu()">

    <div id="p1" class="planeta" style="top:20%; left:30%;" onclick="abrirMenu(event, 'Coruscant', 'p1')">
        <span class="bandera">🚩</span>
        <div class="etiqueta">CORUSCANT</div>
    </div>

    <div id="p2" class="planeta" style="top:50%; left:60%;" onclick="abrirMenu(event, 'Tatooine', 'p2')">
        <span class="bandera">🚩</span>
        <div class="etiqueta">TATOOINE</div>
    </div>

    <div id="menu" onclick="event.stopPropagation()">
        <h3 id="nom" style="margin:0; font-size:14px;">-</h3>
        <button onclick="ejecutar('C')">🚩 CONQUISTAR</button>
        <button onclick="ejecutar('A')">⚔️ ATACAR</button>
        <button onclick="ejecutar('D')">🛡️ DEFENDER</button>
    </div>

<script>
    var menu = document.getElementById('menu');
    var idAct = "";

    function abrirMenu(e, nom, id) {
        e.stopPropagation();
        idAct = id;
        document.getElementById('nom').innerText = nom;
        menu.style.display = 'block';
        menu.style.left = e.clientX + 'px';
        menu.style.top = e.clientY + 'px';
    }

    function ejecutar(tipo) {
        var p = document.getElementById(idAct);
        var b = p.querySelector('.bandera');
        
        p.classList.remove('ataque', 'defensa', 'animar');
        b.style.display = "none";

        // Pequeño delay para la animación
        setTimeout(() => { p.classList.add('animar'); }, 10);
        setTimeout(() => { p.classList.remove('animar'); }, 300);

        if(tipo === 'C') b.style.display = "block";
        if(tipo === 'A') p.classList.add('ataque');
        if(tipo === 'D') p.classList.add('defensa');

        menu.style.display = 'none';
    }

    function cerrarMenu() { menu.style.display = 'none'; }
</script>
</body>
</html>
