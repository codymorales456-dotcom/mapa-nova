<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; padding: 0; background: #000; color: #00d2ff; font-family: 'Segoe UI', sans-serif; overflow: hidden; user-select: none; }
        #espacio { width: 100vw; height: 100vh; background: radial-gradient(circle at center, #1B2735 0%, #000 100%); position: relative; z-index: 1; }
        
        /* LIENZO PARA LAS RUTAS */
        #rutas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0; /* Por debajo de los planetas */
            pointer-events: none;
        }

        .planeta {
            position: absolute; width: 60px; height: 60px; border-radius: 50%; cursor: pointer;
            transition: all 0.3s ease; display: flex; align-items: center; justify-content: center;
            border: 2px solid rgba(255,255,255,0.2); z-index: 2;
        }
        .planeta:hover { transform: scale(1.2); filter: brightness(1.3); }

        .republica { border-color: #00a2ff; box-shadow: 0 0 15px rgba(0, 162, 255, 0.4); }
        .cis { border-color: #ff3333; box-shadow: 0 0 15px rgba(255, 51, 51, 0.4); }

        .etiqueta { position: absolute; bottom: -20px; font-size: 9px; font-weight: bold; color: white; text-shadow: 1px 1px 3px black; text-transform: uppercase; white-space: nowrap; }
        .icono-bandera { display: none; position: absolute; top: -35px; font-size: 25px; z-index: 10; }

        .ataque { box-shadow: 0 0 40px #ff0000 !important; border-color: #ff0000 !important; background: rgba(255,0,0,0.4) !important; }
        .defensa { box-shadow: 0 0 40px #00ff00 !important; border-color: #00ff00 !important; background: rgba(0,255,0,0.4) !important; }
        
        #menu-tactico {
            display: none; position: absolute; background: rgba(0, 10, 30, 0.95); border: 1px solid #00d2ff;
            padding: 10px; width: 170px; border-radius: 5px; z-index: 9999; box-shadow: 0 0 20px black;
        }
        .btn { display: block; width: 100%; padding: 8px; margin: 4px 0; cursor: pointer; font-size: 10px; font-weight: bold; border: 1px solid #00d2ff; background: transparent; color: #00d2ff; }
        .btn:hover { background: #00d2ff; color: black; }
    </style>
</head>
<body onclick="cerrarMenu()">

<div id="espacio">
    <canvas id="rutas"></canvas>
    
    <div id="p1" class="planeta republica" style="top: 45%; left: 48%; background: radial-gradient(circle, #4db8ff, #004466);" onclick="abrirMenu(event, 'Coruscant', 'p1')">
        <span class="icono-bandera">🚩</span><div class="etiqueta">Coruscant</div>
    </div>
    <div id="p2" class="planeta republica" style="top: 75%; left: 75%; background: radial-gradient(circle, #aaddff, #336699);" onclick="abrirMenu(event, 'Kamino', 'p2')">
        <span class="icono-bandera">🚩</span><div class="etiqueta">Kamino</div>
    </div>
    <div id="p3" class="planeta republica" style="top: 65%; left: 55%; background: radial-gradient(circle, #5cd65c, #004400);" onclick="abrirMenu(event, 'Naboo', 'p3')">
        <span class="icono-bandera">🚩</span><div class="etiqueta">Naboo</div>
    </div>
    <div id="p4" class="planeta republica" style="top: 25%; left: 35%; background: radial-gradient(circle, #888, #222);" onclick="abrirMenu(event, 'Anaxes', 'p4')">
        <span class="icono-bandera">🚩</span><div class="etiqueta">Anaxes</div>
    </div>
    <div id="p5" class="planeta republica" style="top: 55%; left: 25%; background: radial-gradient(circle, #00f2ff, #003344);" onclick="abrirMenu(event, 'Christophsis', 'p5')">
        <span class="icono-bandera">🚩</span><div class="etiqueta">Christophsis</div>
    </div>

    <div id="p6" class="planeta cis" style="top: 75%; left: 40%; background: radial-gradient(circle, #ff8c1a, #663300);" onclick="abrirMenu(event, 'Geonosis', 'p6')">
        <span class="icono-bandera">🚩</span><div class="etiqueta">Geonosis</div>
    </div>
    <div id="p7" class="planeta cis" style="top: 85%; left: 25%; background: radial-gradient(circle, #e6ccb3, #4d3319);" onclick="abrirMenu(event, 'Utapau', 'p7')">
        <span class="icono-bandera">🚩</span><div class="etiqueta">Utapau</div>
    </div>
    <div id="p8" class="planeta cis" style="top: 15%; left: 65%; background: radial-gradient(circle, #ffffff, #555);" onclick="abrirMenu(event, 'Mygeeto', 'p8')">
        <span class="icono-bandera">🚩</span><div class="etiqueta">Mygeeto</div>
    </div>
    <div id="p9" class="planeta cis" style="top: 40%; left: 80%; background: radial-gradient(circle, #ff66ff, #440044);" onclick="abrirMenu(event, 'Felucia', 'p9')">
        <span class="icono-bandera">🚩</span><div class="etiqueta">Felucia</div>
    </div>
    <div id="p10" class="planeta cis" style="top: 88%; left: 10%; background: radial-gradient(circle, #ff3300, #440000);" onclick="abrirMenu(event, 'Mustafar', 'p10')">
        <span class="icono-bandera">🚩</span><div class="etiqueta">Mustafar</div>
    </div>

    <div id="menu-tactico" onclick="event.stopPropagation()">
        <h3 id="txt-nombre" style="text-align:center; margin:5px; font-size:14px;">SECTOR</h3>
        <button class="btn" onclick="ejecutar('C')">🚩 OCUPAR</button>
        <button class="btn" onclick="ejecutar('A')" style="color:#ff3333;">⚔️ ATACAR</button>
        <button class="btn" onclick="ejecutar('D')" style="color:#33ff33;">🛡️ DEFENDER</button>
        <button class="btn" onclick="ejecutar('N')" style="font-size:8px; opacity:0.5;">LIMPIAR</button>
    </div>
</div>

<script>
    var menu = document.getElementById('menu-tactico');
    var titulo = document.getElementById('txt-nombre');
    var idActual = "";

    function abrirMenu(e, nombre, id) {
        e.stopPropagation();
        idActual = id;
        titulo.innerText = nombre.toUpperCase();
        menu.style.display = 'block';
        menu.style.left = e.clientX + "px";
        menu.style.top = e.clientY + "px";
    }

    function ejecutar(tipo) {
        if(window.gmod) gmod.enviarOrden(idActual, tipo);
        cerrarMenu();
    }

    function actualizarDesdeGmod(id, tipo) {
        var p = document.getElementById(id);
        if(!p) return;
        var b = p.querySelector('.icono-bandera');
        p.classList.remove('ataque', 'defensa');
        if(b) b.style.display = "none";
        if(tipo === 'C' && b) b.style.display = "block";
        else if(tipo === 'A') p.classList.add('ataque');
        else if(tipo === 'D') p.classList.add('defensa');
    }

    function cerrarMenu() { menu.style.display = 'none'; }

    // --- DIBUJAR RUTAS ---
    function dibujarRutas() {
        const canvas = document.getElementById('rutas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        ctx.strokeStyle = "rgba(0, 210, 255, 0.15)";
        ctx.lineWidth = 1;
        ctx.setLineDash([5, 15]); // Línea punteada estilo radar

        const conexiones = [
            ['p1','p4'], ['p1','p3'], ['p1','p5'], ['p1','p6'], ['p1','p8'],
            ['p3','p2'], ['p2','p9'], ['p6','p7'], ['p7','p10'], ['p5','p4']
        ];

        conexiones.forEach(par => {
            const el1 = document.getElementById(par[0]);
            const el2 = document.getElementById(par[1]);
            if(el1 && el2) {
                const r1 = el1.getBoundingClientRect();
                const r2 = el2.getBoundingClientRect();
                ctx.beginPath();
                ctx.moveTo(r1.left + r1.width/2, r1.top + r1.height/2);
                ctx.lineTo(r2.left + r2.width/2, r2.top + r2.height/2);
                ctx.stroke();
            }
        });
    }

    window.onload = dibujarRutas;
    window.onresize = dibujarRutas;
</script>

</body>
</html>
