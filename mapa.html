<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mapa Galáctico - Nova Networks</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            color: #00d2ff;
            font-family: 'Segoe UI', Arial, sans-serif;
            overflow: hidden;
            user-select: none;
        }

        /* FONDO DE ESPACIO */
        #espacio {
            width: 100vw;
            height: 100vh;
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
            position: relative;
        }

        /* PLANETAS */
        .planeta {
            position: absolute;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.4);
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .planeta:hover {
            transform: scale(1.15);
            box-shadow: 0 0 35px #00d2ff;
            filter: brightness(1.3);
        }

        .etiqueta {
            position: absolute;
            bottom: -25px;
            font-size: 13px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 8px #000;
            white-space: nowrap;
        }

        /* MENÚ TÁCTICO FLOTANTE */
        #menu-tactico {
            display: none;
            position: absolute;
            background: rgba(0, 10, 25, 0.95);
            border: 2px solid #00d2ff;
            padding: 15px;
            width: 220px;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.5);
            z-index: 9999;
            backdrop-filter: blur(4px);
        }

        #menu-tactico h3 {
            margin: 0 0 12px 0;
            font-size: 16px;
            text-align: center;
            border-bottom: 1px solid rgba(0, 210, 255, 0.5);
            padding-bottom: 8px;
            color: #fff;
        }

        .btn-orden {
            display: block;
            width: 100%;
            padding: 10px;
            margin: 6px 0;
            background: rgba(0, 210, 255, 0.1);
            border: 1px solid #00d2ff;
            color: #00d2ff;
            cursor: pointer;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.2s;
        }

        .btn-orden:hover {
            background: #00d2ff;
            color: #000;
        }

        .btn-atacar:hover { background: #ff3c3c; border-color: #ff3c3c; color: white; }
        .btn-defender:hover { background: #3cff3c; border-color: #3cff3c; color: black; }

        .cerrar-aviso {
            font-size: 10px;
            color: #666;
            text-align: center;
            margin-top: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div id="espacio" onclick="cerrarMenu()">
    <div class="planeta" style="top: 25%; left: 35%; background: radial-gradient(circle, #4db8ff, #004466);" onclick="abrirMenu(event, 'Coruscant')">
        <div class="etiqueta">CORUSCANT</div>
    </div>

    <div class="planeta" style="top: 55%; left: 65%; background: radial-gradient(circle, #ffcc66, #996600);" onclick="abrirMenu(event, 'Tatooine')">
        <div class="etiqueta">TATOOINE</div>
    </div>

    <div class="planeta" style="top: 75%; left: 25%; background: radial-gradient(circle, #66ff66, #004400);" onclick="abrirMenu(event, 'Endor')">
        <div class="etiqueta">ENDOR</div>
    </div>

    <div class="planeta" style="top: 15%; left: 75%; background: radial-gradient(circle, #ffffff, #99ccff);" onclick="abrirMenu(event, 'Hoth')">
        <div class="etiqueta">HOTH</div>
    </div>

    <div id="menu-tactico" onclick="event.stopPropagation()">
        <h3 id="planeta-nombre">PLANETA</h3>
        <button class="btn-orden" onclick="ordenTactica('OBJETIVO DE CONQUISTA')">Marcar Conquista</button>
        <button class="btn-orden btn-atacar" onclick="ordenTactica('ATAQUE INMEDIATO')">Iniciar Ataque</button>
        <button class="btn-orden btn-defender" onclick="ordenTactica('REFORZAR DEFENSA')">Reforzar Sector</button>
        <div class="cerrar-aviso">[ CLICK FUERA PARA CERRAR ]</div>
    </div>
</div>

<script>
    const menu = document.getElementById('menu-tactico');
    const titulo = document.getElementById('planeta-nombre');

    function abrirMenu(e, nombre) {
        e.stopPropagation(); // Evita que el clic cierre el menú al instante
        
        titulo.innerText = nombre.toUpperCase();
        menu.style.display = 'block';
        
        // Ajustamos la posición para que no se salga de la pantalla
        let x = e.clientX + 15;
        let y = e.clientY + 15;
        
        if (x + 220 > window.innerWidth) x = e.clientX - 230;
        if (y + 200 > window.innerHeight) y = e.clientY - 200;

        menu.style.left = x + 'px';
        menu.style.top = y + 'px';
    }

    function ordenTactica(tipo) {
        const planeta = titulo.innerText;
        alert("TRANSMISIÓN ENVIADA: " + tipo + " en " + planeta);
        cerrarMenu();
    }

    function cerrarMenu() {
        menu.style.display = 'none';
    }
</script>

</body>
</html>
