<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; padding: 0; background: #000; color: #00d2ff; font-family: 'Segoe UI', sans-serif; overflow: hidden; user-select: none; }
        
        #espacio { width: 100vw; height: 100vh; background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%); position: relative; }

        /* ANIMACIÓN DE SELECCIÓN (Destello) */
        @keyframes pulso-seleccion {
            0% { transform: scale(1); box-shadow: 0 0 0px #fff; }
            50% { transform: scale(1.3); box-shadow: 0 0 50px #fff; }
            100% { transform: scale(1.15); box-shadow: 0 0 20px rgba(0,210,255,0.4); }
        }

        .animar-click { animation: pulso-seleccion 0.5s ease-out; }

        /* PLANETAS */
        .planeta {
            position: absolute; width: 70px; height: 70px; border-radius: 50%; cursor: pointer;
            transition: 0.5s; display: flex; align-items: center; justify-content: center;
            border: 2px solid transparent;
        }

        .etiqueta { position: absolute; bottom: -25px; font-size: 12px; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 8px #000; white-space: nowrap; }

        /* ICONO DE BANDERA */
        .bandera {
            display: none; position: absolute; top: -30px; font-size: 24px; filter: drop-shadow(0 0 5px gold);
        }

        /* ESTADOS TÁCTICOS */
        .estado-ataque { box-shadow: 0 0 40px #ff3c3c !important; border-color: #ff3c3c !important; filter: saturate(2); }
        .estado-defensa { box-shadow: 0 0 40px #3cff3c !important; border-color: #3cff3c !important; filter: saturate(2); }

        /* MENÚ TÁCTICO */
        #menu-tactico {
            display: none; position: absolute; background: rgba(0, 10, 25, 0.95); border: 2px solid #00d2ff;
            padding: 15px; width: 220px; border-radius: 8px; box-shadow: 0 0 30px rgba(0, 210, 255, 0.5); z-index: 9999;
        }

        .btn-orden { display: block; width: 100%; padding: 10px; margin: 6px 0; background: rgba(0, 210, 255, 0.1); border: 1px solid #00d2ff; color: #00d2ff; cursor: pointer; font-size: 11px; font-weight: bold; text-transform: uppercase; transition: 0.2s; }
        .btn-orden:hover { background: #00d2ff; color: #000; }
        .btn-atacar:hover { background: #ff3c3c; border-color: #ff3c3c; color: white; }
        .btn-defender:hover { background: #3cff3c; border-color: #3cff3c; color: black; }
    </style>
</head>
<body>

<div id="espacio" onclick="cerrarMenu()">
    
    <div id="planeta-1" class="planeta" style="top: 25%; left: 35%; background: radial-gradient(circle, #4db8ff, #004466);" onclick="abrirMenu(event, 'Coruscant', 'planeta-1')">
        <div class="bandera">🚩</div>
        <div class="etiqueta">CORUSCANT</div>
    </div>

    <div id="planeta-2" class="planeta" style="top: 55%; left: 65%; background: radial-gradient(circle, #ffcc66, #996600);" onclick="abrirMenu(event, 'Tatooine', 'planeta-2')">
        <div class="bandera">🚩</div>
        <div class="etiqueta">TATOOINE</div>
    </div>

    <div id="planeta-3" class="planeta" style="top: 75%; left: 25%; background: radial-gradient(circle, #66ff66, #004400);" onclick="abrirMenu(event, 'Endor', 'planeta-3')">
        <div class="bandera">🚩</div>
        <div class="etiqueta">ENDOR</div>
    </div>

    <div id="menu-tactico" onclick="event.stopPropagation()">
        <h3 id="planeta-nombre" style="text-align:center; margin:0 0 10px 0;">PLANETA</h3>
        <button class="btn-orden" onclick="aplicarOrden('CONQUISTA')">Marcar Conquista</button>
        <button class="btn-orden btn-atacar" onclick="aplicarOrden('ATAQUE')">Iniciar Ataque</button>
        <button class="btn-orden btn-defender" onclick="aplicarOrden('DEFENSA')">Reforzar Sector</button>
    </div>
</div>

<script>
    const menu = document.getElementById('menu-tactico');
    const titulo = document.getElementById('planeta-nombre');
    let planetaSeleccionadoID = null;

    function abrirMenu(e, nombre, id) {
        e.stopPropagation();
        planetaSeleccionadoID = id;
        titulo.innerText = nombre.toUpperCase();
        menu.style.display = 'block';
        menu.style.left = (e.clientX + 15) + 'px';
        menu.style.top = (e.clientY + 15) + 'px';
    }

    function aplicarOrden(tipo) {
        const p = document.getElementById(planetaSeleccionadoID);
        const bandera = p.querySelector('.bandera');

        // 1. Limpiar estados previos
        p.classList.remove('estado-ataque', 'estado-defensa', 'animar-click');
        bandera.style.display = 'none';

        // 2. Forzar reinicio de animación
        void p.offsetWidth; 
        p.classList.add('animar-click');

        // 3. Aplicar nuevo estado
        if (tipo === 'CONQUISTA') {
            bandera.style.display = 'block';
        } else if (tipo === 'ATAQUE') {
            p.classList.add('estado-ataque');
        } else if (tipo === 'DEFENSA') {
            p.classList.add('estado-defensa');
        }

        cerrarMenu();
    }

    function cerrarMenu() { menu.style.display = 'none'; }
</script>

</body>
</html>
